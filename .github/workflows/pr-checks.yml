name: PR Checks

on:
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test and Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    
    - name: Run tests with coverage
      run: mvn clean verify
    
    - name: Run code quality checks
      run: mvn spotbugs:check checkstyle:check
    
    - name: SonarCloud Scan
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn sonar:sonar
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./core/target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
    
    - name: Comment PR with quality report
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Try to read JaCoCo coverage report
          let coverageInfo = '';
          try {
            const coverageFile = 'core/target/site/jacoco/index.html';
            if (fs.existsSync(coverageFile)) {
              coverageInfo = '✅ Code coverage report generated';
            }
          } catch (error) {
            coverageInfo = '⚠️ Coverage report not found';
          }
          
          const comment = `## 🔍 Code Quality Report
          
          ### Test Results
          - Tests executed ✅
          - Code coverage: ${coverageInfo}
          
          ### Static Analysis
          - SpotBugs analysis completed
          - Checkstyle validation completed
          - SonarCloud analysis completed
          
          Please check the workflow logs for detailed results.`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });